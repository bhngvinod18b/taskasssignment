<!DOCTYPE html>
<html>
<head>
<title>Inbox</title>

<style>
body {
    font-family: Arial;
    background: #f0f2f5;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 10px;
    margin-top: 20px;
    border-radius: 8px;
}

h2 {
    text-align: center;
}

.user {
    padding: 15px;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
}

.user a {
    text-decoration: none;
    color: black;
    font-size: 16px;
    display: block;
}

.user:hover {
    background: #f5f5f5;
}

.notification {
    background: #e7f3ff;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 5px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h2>💬 Inbox</h2>

<div id="live-box"></div>

{% for u in users %}
    <div class="user">
        <a href="{% url 'chat' u.id %}">{{ u.username }}</a>
    </div>
{% empty %}
    <p>No users found</p>
{% endfor %}

</div>

<script>

const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";

const socket = new WebSocket(
    wsProtocol + "://" + window.location.host + "/ws/inbox/"
);

socket.onmessage = function(event) {

    const data = JSON.parse(event.data);

    const box = document.getElementById("live-box");

    const div = document.createElement("div");
    div.classList.add("notification");

    div.innerText = data.sender + ": " + data.message;

    box.prepend(div);
};

socket.onclose = () => {
    console.log("Inbox socket closed");
};

socket.onerror = (e) => {
    console.log("Inbox socket error:", e);
};

</script>

</body>
</html>
