
<!DOCTYPE html>
<html>
<head>
    <title>Inbox Chat</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #e5ddd5;
        }

        .header {
            background: #075e54;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 80vh;
            overflow-y: auto;
            padding: 10px;
        }

        .bubble {
            max-width: 60%;
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
        }

        .left {
            background: white;
            align-self: flex-start;
        }

        .right {
            background: #dcf8c6;
            align-self: flex-end;
        }

        .input-box {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            background: white;
            padding: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            background: #075e54;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="header">
    Chat with {{ other_user.username }}
</div>

<div class="chat-container">

    {% for msg in messages %}

        {% if msg.sender == request.user %}
            <div class="bubble right">
                {{ msg.content }}
            </div>
        {% else %}
            <div class="bubble left">
                {{ msg.content }}
            </div>
        {% endif %}

    {% empty %}
        <p>No messages yet</p>
    {% endfor %}

</div>

<form method="POST" class="input-box">
    {% csrf_token %}
    <input type="text" name="content" placeholder="Type message..." required>
    <button type="submit">Send</button>
</form>

</body>
</html>
