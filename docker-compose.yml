version: '3.9'

services:
  redis:
    image: redis:8.6
    container_name: myproject-redis
    ports:
      - "6379:6379"
    command: redis-server --loadmodule /usr/lib/redis/modules/rejson.so --loadmodule /usr/lib/redis/modules/redisbloom.so --loadmodule /usr/lib/redis/modules/redistimeseries.so --loadmodule /usr/lib/redis/modules/redisearch.so
    volumes:
      - redis_data:/data

  web:
    build: .
    container_name: myproject-web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=myproject.settings

  worker:
    build: .
    container_name: celery_worker
    command: celery -A myproject worker -l info -Q default,notifications
    volumes:
      - .:/code
    depends_on:
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=myproject.settings

volumes:
  redis_data: